name: APK Yap

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Sistem paketlerini kur
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip autoconf libtool \
            libtool-bin pkg-config zlib1g-dev libncurses-dev cmake \
            libffi-dev libssl-dev build-essential ccache m4

      - name: Buildozer kur
        run: |
          pip install --upgrade pip
          pip install "buildozer==1.5.0" "cython==0.29.36"

      - name: APK derle
        run: buildozer -v android debug

      - name: APK yukle
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
