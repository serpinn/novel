name: APK Yap

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Buildozer cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sistem bagimliliklari
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool libtool-bin \
            pkg-config zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev \
            automake build-essential ccache m4

      - name: Python bagimliliklari
        run: |
          pip install --upgrade pip
          pip install --upgrade buildozer cython==0.29.36 virtualenv

      - name: Java yolu ayarla
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64" >> $GITHUB_ENV

      - name: APK derle
        run: yes | buildozer -v android debug

      - name: APK yukle
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
          retention-days: 7
